name: Python CI (Tests & Lint)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CANVAS_USER: test_user
  CANVAS_PASS: test_pass

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run syntax compile check
      run: |
        python -m py_compile app.py db.py run_prod.py analytics_utils.py

    - name: Run unit tests with pytest
      run: |
        pytest test_app.py
