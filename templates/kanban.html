<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Canvas · Aether</title>
  <style>
    * { font-family: 'Inter', -apple-system, sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0A0A0B; --surface: #161618; --surface-hover: #1C1C1F;
      --border: #2A2A2D; --border-strong: #3A3A40;
      --text: #FAFAFA; --text-muted: #A1A1AA; --text-dim: #71717A; --text-faint: #52525B;
      --accent: #8B5CF6; --accent-hover: #A78BFA; --accent-dim: rgba(139,92,246,0.1);
      --danger: #EF4444; --warning: #F59E0B; --success: #10B981;
      --glass: rgba(25,25,38,0.55); --glass-border: rgba(139,92,246,0.1);
    }
    body { background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .header { position: sticky; top: 0; z-index: 50; background: rgba(10,10,11,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 14px 20px; }
    .header-inner { display: flex; justify-content: space-between; align-items: center; }
    .brand-text { font-size: 17px; font-weight: 700; color: white; }
    .brand-sub { font-size: 9px; letter-spacing: 0.15em; color: var(--accent-hover); font-weight: 700; margin-top: 2px; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; font-size: 12px; font-weight: 500; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; transition: all 0.15s; text-decoration: none; }
    .btn:hover { color: var(--text); border-color: var(--border-strong); }
    .btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent-hover); }

    .controls { padding: 12px 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid var(--border); }
    .search-input { flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 20px; font-size: 13px; outline: none; }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; font-size: 12px; font-weight: 500; background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); border-radius: 20px; cursor: pointer; transition: all 0.15s; }
    .chip:hover { color: var(--text); border-color: var(--border-strong); }
    .chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent-hover); }

    .board { display: flex; gap: 12px; overflow-x: auto; padding: 16px; max-width: 100%; }
    .column { min-width: 250px; max-width: 320px; flex: 1; display: flex; flex-direction: column; gap: 8px; background: #121215; padding: 12px; border-radius: 16px; border: 1px solid var(--border); }
    .col-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); display: flex; justify-content: space-between; }
    .col-count { font-size: 11px; font-weight: 600; background: var(--surface-active, #232328); padding: 2px 8px; border-radius: 10px; color: var(--text-muted); }
    .col-body { display: flex; flex-direction: column; gap: 6px; min-height: 60px; }
    .col-body.drop-active { background: rgba(139,92,246,0.06); border-radius: 12px; }

    .card { padding: 12px 14px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; cursor: grab; transition: all 0.2s; backdrop-filter: blur(10px); position: relative; }
    .card:hover { background: rgba(139,92,246,0.08); border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.15); }
    .card.dragging { opacity: 0.5; transform: scale(0.96); }
    .card-title { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.9); line-height: 1.4; margin-bottom: 8px; word-break: break-word; user-select: text; }
    .card-title a { color: var(--accent-hover); text-decoration: underline; text-underline-offset: 2px; pointer-events: auto; }
    .card-title a:hover { color: #C4B5FD; }
    .card-note { font-size: 11px; color: var(--accent-hover); margin: 4px 0 6px; padding: 4px 8px; background: rgba(139,92,246,0.08); border-radius: 8px; font-style: italic; user-select: text; }
    .card-note a { color: var(--accent-hover); text-decoration: underline; text-underline-offset: 2px; pointer-events: auto; }
    .card-meta { display: flex; align-items: center; gap: 6px; font-size: 10.5px; color: var(--text-dim); flex-wrap: wrap; }
    .card-actions { display: flex; gap: 4px; margin-top: 8px; opacity: 0; transition: opacity 0.2s; }
    .card:hover .card-actions { opacity: 1; }
    .action-btn { font-size: 10px; padding: 3px 8px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
    .action-btn:hover { border-color: var(--accent); color: var(--accent-hover); background: var(--accent-dim); }
    .action-btn.danger:hover { border-color: var(--danger); color: var(--danger); background: rgba(239,68,68,0.08); }
    .action-btn.done-btn:hover { border-color: var(--success); color: var(--success); background: rgba(16,185,129,0.08); }

    .priority-dot { position: absolute; left: 10px; top: 10px; width: 8px; height: 8px; border-radius: 50%; }
    .p1 { background: var(--danger); box-shadow: 0 0 6px rgba(239,68,68,0.5); }
    .p2 { background: var(--warning); box-shadow: 0 0 6px rgba(245,158,11,0.5); }
    .p3 { background: #eab308; }
    .p4 { background: var(--success); }
    .p5 { background: var(--text-faint); }

    .quick-add { display: flex; gap: 8px; padding: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-top: 4px; }
    .quick-add input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 12px; }
    .quick-add input::placeholder { color: var(--text-faint); }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--accent); padding: 10px 18px; border-radius: 12px; z-index: 1000; font-size: 13px; box-shadow: 0 4px 24px rgba(0,0,0,0.4); display: none; }
    .toast.show { display: flex; align-items: center; gap: 8px; animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    .empty-state { padding: 32px 16px; text-align: center; color: var(--text-dim); font-size: 13px; }

    @media (max-width: 768px) {
      .board { flex-direction: column; }
      .column { min-width: unset; max-width: unset; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="flex items-center gap-3">
      <span class="brand-text">Canvas</span>
      <span class="brand-sub">AETHER EDITION</span>
      <div class="w-2 h-2 rounded-full bg-[var(--accent)]" style="width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent)"></div>
    </div>
    <div class="flex items-center gap-2">
      <button class="btn" onclick="openArchive()">🗄️ ארכיון</button>
      <span style="font-size:12px;color:var(--text-dim)">📅 <span id="today-date"></span></span>
    </div>
  </div>
</header>

<div class="controls">
  <input type="text" class="search-input" placeholder="🔍 חפש..." id="search" oninput="render()">
  <button class="chip active" data-filter="all" onclick="setFilter('all',this)">הכל</button>
  <button class="chip" data-filter="work" onclick="setFilter('work',this)">💼 עבודה</button>
  <button class="chip" data-filter="personal" onclick="setFilter('personal',this)">🏠 אישית</button>
  <span style="color:var(--text-faint)">|</span>
  <button class="chip" id="archive-chip" onclick="openArchive()">🗄️ ארכיון</button>
  <span style="color:var(--text-faint)">|</span>
  <button class="chip" id="remind-all-chip" onclick="showAllReminders()">⏰ תזכורות</button>
</div>

<div class="board" id="board"></div>

<!-- Archive Overlay -->
<div id="archive-overlay" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.7);align-items:center;justify-content:center">
  <div style="background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:18px;font-weight:700">🗄️ ארכיון</h2>
      <button class="btn" onclick="closeArchive()">✕ סגור</button>
    </div>
    <div id="archive-list">טוען...</div>
  </div>
</div>

<!-- Reminder Modal -->
<div id="remind-modal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.7);align-items:center;justify-content:center">
  <div style="background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:380px;width:90%">
    <h2 style="font-size:16px;font-weight:700;margin-bottom:4px">🔔 תזכורת</h2>
    <p id="remind-task-name" style="font-size:13px;color:var(--text-muted);margin-bottom:20px"></p>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
      <button class="remind-preset chip active" data-preset="now" onclick="setRemindPreset('now')">עכשיו ⚡</button>
      <button class="remind-preset chip" data-preset="1h" onclick="setRemindPreset('1h')">עוד שעה ⏰</button>
      <button class="remind-preset chip" data-preset="3h" onclick="setRemindPreset('3h')">עוד 3 שעות</button>
      <button class="remind-preset chip" data-preset="morning" onclick="setRemindPreset('morning')">מחר בבוקר 🌅</button>
      <button class="remind-preset chip" data-preset="evening" onclick="setRemindPreset('evening')">מחר בערב 🌙</button>
      <button class="remind-preset chip" data-preset="custom" onclick="setRemindPreset('custom')">מותאם 📅</button>
    </div>
    <div id="remind-custom" style="display:none;gap:8px;margin-bottom:16px">
      <input type="date" id="remind-date" style="flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;font-size:12px">
      <input type="time" id="remind-time" style="flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;font-size:12px">
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeRemindModal()">ביטול</button>
      <button class="btn active" onclick="sendReminder()">שלח 🔔</button>
    </div>
  </div>
</div>
<input type="hidden" id="remind-card-id">

<div class="toast" id="toast">
  <span>✓</span><span id="toast-msg"></span>
</div>

<div style="position:fixed;bottom:16px;right:16px;z-index:40">
  <button onclick="quickAddMobile()" class="btn active" style="width:48px;height:48px;border-radius:50%;font-size:24px;justify-content:center;padding:0;box-shadow:0 4px 12px rgba(139,92,246,0.3)">+</button>
</div>

<script>
const API = '/api';
let boardData = { columns: [] };
let activeFilter = 'all';

async function init() {
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});
  await fetchBoard();
}

async function fetchBoard() {
  try {
    const r = await fetch(API+'/board');
    boardData = await r.json();
  } catch(e) {
    boardData = { columns: [
      {id:'backlog',title:'📚 Backlog',cards:[]},
      {id:'week',title:'📅 השבוע',cards:[]},
      {id:'inprogress',title:'🚀 In Progress',cards:[]},
      {id:'waiting',title:'⏳ במעקב',cards:[]},
      {id:'done',title:'✅ Done',cards:[]}
    ]};
  }
  render();
}

function match(card) {
  const q = (document.getElementById('search')?.value||'').toLowerCase();
  if (q && !(card.content||'').toLowerCase().includes(q)) return false;
  if (activeFilter === 'work' && card.tag !== 'עבודה') return false;
  if (activeFilter === 'personal' && card.tag !== 'אישית') return false;
  if (card.archived) return false;
  return true;
}

function setFilter(f,btn) {
  activeFilter = f;
  document.querySelectorAll('[data-filter]').forEach(b => {
    if (b.dataset.filter === f) b.classList.add('active');
    else b.classList.remove('active');
  });
  render();
}

function render() {
  const board = document.getElementById('board');
  const cols = boardData.columns;
  
  board.innerHTML = cols.map(col => {
    const cards = col.cards.filter(match);
    return `
      <div class="column">
        <div class="col-title">
          <span>${col.title}</span>
          <span class="col-count">${cards.length}</span>
        </div>
        <div class="col-body"
             ondragover="event.preventDefault();this.classList.add('drop-active')"
             ondragleave="this.classList.remove('drop-active')"
             ondrop="handleDrop(event,'${col.id}')">
          ${cards.length ? [...cards].reverse().map(c => `
            <div class="card" draggable="true" data-id="${c.id}"
                 ondragstart="event.dataTransfer.setData('text/plain','${c.id}');this.classList.add('dragging')"
                 ondragend="this.classList.remove('dragging')">
              <div class="priority-dot p${c.priority||3}"></div>
              <div class="card-title">${linkify(c.content)}</div>
              ${c.note ? `<div class="card-note">💬 ${linkify(c.note)}</div>` : ''}
              <div class="card-meta">
                ${c.tag ? `<span>${c.tag==='עבודה'?'💼':'🏠'} ${esc(c.tag)}</span>` : ''}
                ${c.due_date ? `<span>📅 ${new Date(c.due_date).toLocaleDateString('he-IL',{day:'numeric',month:'short'})}</span>` : ''}
              </div>
              <div class="card-actions">
                <button class="action-btn" onclick="event.stopPropagation();addNote('${c.id}')">💬</button>
                <button class="action-btn" onclick="event.stopPropagation();editCard('${c.id}')">✎</button>
                <button class="action-btn remind-btn" onclick="event.stopPropagation();remindMe('${c.id}')">🔔</button>
                <button class="action-btn done-btn" onclick="event.stopPropagation();markDone('${c.id}')">✅</button>
                <button class="action-btn danger" onclick="event.stopPropagation();deleteCard('${c.id}')">✕</button>
              </div>
            </div>
          `).join('') : '<div class="empty-state">—</div>'}
        </div>
        <div class="quick-add">
          <span style="color:var(--text-faint)">+</span>
          <input type="text" placeholder="הוסף..." onkeydown="if(event.key==='Enter')addCard('${col.id}',this)">
        </div>
      </div>`;
  }).join('');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function linkify(text) {
  text = esc(text);
  return text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" onclick="event.stopPropagation()">🔗 קישור</a>');
}

async function addCard(colId, input) {
  const v = input.value.trim();
  if (!v) return;
  await fetch(API+'/cards',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:v,column_id:colId})});
  input.value = '';
  await fetchBoard();
  toast('✅ נוסף');
}

async function handleDrop(e, toCol) {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-active');
  const id = e.dataTransfer.getData('text/plain');
  if (!id) return;
  await fetch(API+'/cards/'+id+'/move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({column_id:toCol})});
  await fetchBoard();
}

async function markDone(id) {
  await fetch(API+'/cards/'+id+'/move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({column_id:'done'})});
  await fetchBoard();
  toast('✅ הושלם');
}

async function remindMe(id) {
  const card = boardData.columns.flatMap(c=>c.cards).find(c=>c.id===id);
  if (!card) return;
  document.getElementById('remind-modal').style.display = 'flex';
  document.getElementById('remind-card-id').value = id;
  document.getElementById('remind-task-name').textContent = card.content;
  closeRemindOptions();
}

function setRemindPreset(preset) {
  document.querySelectorAll('.remind-preset').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('remind-custom').style.display = preset === 'custom' ? 'flex' : 'none';
}

async function sendReminder() {
  const id = document.getElementById('remind-card-id').value;
  const preset = document.querySelector('.remind-preset.active')?.dataset?.preset || 'now';
  let delay = preset;
  if (preset === 'custom') {
    const d = document.getElementById('remind-date').value;
    const t = document.getElementById('remind-time').value;
    if (!d || !t) return toast('❌ בחר תאריך ושעה');
    delay = d + 'T' + t;
  }
  const r = await fetch(API+'/cards/'+id+'/remind',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({delay:delay})
  });
  const data = await r.json();
  const labels = {now:'עכשיו ⚡', '1h':'עוד שעה ⏰', 'morning':'מחר בבוקר 🌅', '3h':'עוד 3 שעות', 'evening':'מחר בערב 🌙'};
  toast('🔔 תזכורת · ' + (labels[delay] || delay.replace('T',' ')));
  closeRemindModal();
}

function closeRemindModal() { document.getElementById('remind-modal').style.display = 'none'; }
function closeRemindOptions() {
  document.getElementById('remind-custom').style.display = 'none';
  document.querySelectorAll('.remind-preset').forEach(b => b.classList.remove('active'));
}

async function addNote(id) {
  const note = prompt('💬 הוסף הערה:');
  if (note === null) return;
  await fetch(API+'/cards/'+id+'/note',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({note:note||''})});
  await fetchBoard();
  toast('💬 הערה נוספה');
}

async function editCard(id) {
  const card = boardData.columns.flatMap(c=>c.cards).find(c=>c.id===id);
  if (!card) return;
  const t = prompt('ערוך:',card.content);
  if (!t) return;
  await fetch(API+'/cards/'+id+'/edit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:t})});
  await fetchBoard();
  toast('✎ עודכן');
}

async function deleteCard(id) {
  if (!confirm('למחוק?')) return;
  await fetch(API+'/cards/'+id,{method:'DELETE'});
  await fetchBoard();
  toast('🗑 נמחק');
}

async function openArchive() {
  document.getElementById('archive-overlay').style.display = 'flex';
  const list = document.getElementById('archive-list');
  list.innerHTML = 'טוען...';
  try {
    const r = await fetch(API+'/archived');
    const data = await r.json();
    const cards = data.archived || [];
    if (!cards.length) { list.innerHTML = '<div class="empty-state">אין משימות בארכיון</div>'; return; }
    list.innerHTML = cards.map(c => `
      <div style="padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="color:var(--text);font-size:14px">${esc(c.content)}</div>
          <div style="color:var(--text-dim);font-size:11px;margin-top:4px">
            📅 ${new Date(c.created_at).toLocaleDateString('he-IL')}
            ${c.tag ? ` · ${c.tag==='עבודה'?'💼':'🏠'} ${esc(c.tag)}` : ''}
          </div>
        </div>
        <button class="btn" onclick="restoreArchived('${c.id}')">שחזר</button>
      </div>
    `).join('');
  } catch { list.innerHTML = '<div class="empty-state">שגיאה</div>'; }
}

function closeArchive() { document.getElementById('archive-overlay').style.display = 'none'; }

async function restoreArchived(id) {
  await fetch(API+'/archived/'+id+'/restore',{method:'POST'});
  await fetchBoard();
  openArchive();
  toast('🔄 שוחזר');
}

function quickAddMobile() {
  const t = prompt('מה להוסיף?');
  if (!t) return;
  fetch(API+'/cards',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:t,column_id:'backlog'})}).then(()=>{fetchBoard();toast('✅ נוסף');});
}

function showAllReminders() {
  const all = boardData.columns.flatMap(c=>c.cards).filter(c=>!c.archived && c.id !== 'done');
  if (!all.length) { toast('אין משימות'); return; }
  const recent = all.slice(-5).reverse().map(c=>'🔔 ' + c.content.substring(0,60)).join('\n');
  alert('5 המשימות האחרונות:\n\n' + (recent || 'אין'));
}

function toast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

init();
</script>
</body>
</html>
